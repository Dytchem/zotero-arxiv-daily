name: Test
on:
  workflow_dispatch:

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      #  with:
      #    repository: ${{ vars.REPOSITORY }}
      #    ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4


      - name: Run script
        env:
          ZOTERO_ID: \${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: \${{ secrets.ZOTERO_KEY }}
          SENDER: \${{ secrets.SENDER }}
          RECEIVER: \${{ secrets.RECEIVER }}
          SENDER_PASSWORD: \${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: \${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: \${{ secrets.OPENAI_API_BASE }}
        run: |
          export DEBUG=true
          python3 -c "import os,yaml;cfg={'zotero':{'user_id':os.environ['ZOTERO_ID'].strip(),'api_key':os.environ['ZOTERO_KEY'].strip(),'include_path':None},'email':{'sender':os.environ['SENDER'].strip(),'receiver':os.environ['RECEIVER'].strip(),'smtp_server':'smtp.qq.com','smtp_port':465,'sender_password':os.environ['SENDER_PASSWORD'].strip()},'llm':{'api':{'key':os.environ['OPENAI_API_KEY'].strip(),'base_url':os.environ['OPENAI_API_BASE'].strip()},'generation_kwargs':{'model':'gpt-4o-mini'}},'source':{'arxiv':{'category':['cs.AI','cs.CV','cs.LG','cs.CL']}},'executor':{'debug':True,'source':['arxiv']}};open('config/custom.yaml','w').write(yaml.dump(cfg,default_flow_style=False))"
          echo "--- custom.yaml ---"
          cat config/custom.yaml
          python3 -c "import yaml;cfg=yaml.safe_load(open('config/custom.yaml'));print(list(cfg['zotero'].keys()));print('user_id len:',len(str(cfg['zotero']['user_id'])));print('api_key len:',len(str(cfg['zotero']['api_key'])))"
          uv run src/zotero_arxiv_daily/main.py